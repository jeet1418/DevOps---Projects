services:
  vprodb:
    build: 
      context: ./Docker-files/db
    image: jeet1418/vprofiledb:v1
    container_name: vprodb
    ports:
      - "3306:3306"
    volumes:
      - vprodbdata:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=vprodbpass

  vprocache01:
    image: memcached
    container_name: vprocache01
    ports:
      - "11211:11211"
    depends_on:
      - vprodb

  vpromq01:
    image: rabbitmq
    container_name: vpromq01
    ports:
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    depends_on:
      - vprocache01

  vproapp:
    build: 
      context: ./Docker-files/app
    image: jeet1418/vprofileapp:v1
    container_name: vproapp
    ports:
      - "8080:8080"
    depends_on:
      - vpromq01
    volumes:
      - vproappdata:/usr/local/tomcat/webapps
  vproweb:
    build: 
      context: ./Docker-files/web
    image: jeet1418/vprofileweb:v1
    container_name: vproweb
    ports:
      - "80:80"
    depends_on:
      - vproapp

volumes:
  vprodbdata: {}
  vproappdata: {}